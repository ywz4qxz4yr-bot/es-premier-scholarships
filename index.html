<html lang="en">

<style>
:root{--r:#FF0024;--rd:#D9001F;--rl:rgba(255,0,36,.06);--y:#FFF200;--yd:#E0D400;--yl:rgba(255,242,0,.08);--bg:#fff;--bgA:#f8f7f4;--dark:#111;--text:#1a1a1a;--tm:#5a5650;--td:#8a847a;--tf:#c8c3ba;--bd:#e8e4de;--bdl:#f0ece6}
*{margin:0;padding:0;box-sizing:border-box}::selection{background:rgba(255,0,36,.12);color:var(--r)}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Source Sans 3',sans-serif}body{overflow-x:hidden}
a{text-decoration:none;color:inherit}button{font-family:inherit;cursor:pointer}
input::placeholder,textarea::placeholder{color:var(--tf)}
input:focus,textarea:focus{border-color:var(--r)!important;outline:none;box-shadow:0 0 0 3px var(--rl)}
.fi{width:100%;padding:13px 16px;border-radius:6px;border:1px solid var(--bd);font-size:14px;font-family:inherit;color:var(--text);background:var(--bg);-webkit-appearance:none;transition:border-color .2s, box-shadow .2s}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}input[type=number]{-moz-appearance:textfield}
.fl{font-size:10px;font-weight:700;color:var(--td);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;display:block}
.c{max-width:1100px;margin:0 auto;padding:0 24px}
.card{background:#fff;border:1px solid var(--bd);border-radius:10px;transition:border-color .3s, transform .3s, box-shadow .3s}
.card:hover{border-color:#d4d0c8}.cc{cursor:pointer}.cc:hover{transform:translateY(-4px);box-shadow:0 10px 30px rgba(0,0,0,.08);border-color:rgba(255,0,36,.25)}
.hd{font-family:'Barlow Condensed',sans-serif;font-weight:800;text-transform:uppercase;line-height:1.05;color:var(--dark)}
.tag{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--r);margin-bottom:10px}
.al{width:48px;height:3px;background:var(--r);margin-bottom:16px;border-radius:2px;position:relative;overflow:hidden}
.al::after{content:"";position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,#fff,transparent);animation:alshine 3s ease-in-out infinite}
@keyframes alshine{0%,60%{left:-100%}80%,100%{left:100%}}
.alc{margin-left:auto;margin-right:auto}
.btn{display:inline-block;padding:14px 32px;border-radius:6px;font-size:14px;font-weight:700;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;text-transform:uppercase;transition:all .25s cubic-bezier(.2,.8,.2,1);border:none;text-align:center;position:relative;overflow:hidden}
.btn::before{content:"";position:absolute;top:0;left:-120%;width:60%;height:100%;background:linear-gradient(120deg,transparent,rgba(255,255,255,.35),transparent);transform:skewX(-20deg);transition:left .6s ease}
.btn:hover::before{left:140%}
.br{background:var(--r);color:#fff;box-shadow:0 4px 14px rgba(255,0,36,.25)}.br:hover{background:var(--rd);transform:translateY(-2px);box-shadow:0 8px 22px rgba(255,0,36,.35)}
.by{background:var(--y);color:var(--dark);box-shadow:0 4px 14px rgba(255,242,0,.35)}.by:hover{filter:brightness(.95);transform:translateY(-2px);box-shadow:0 8px 22px rgba(255,242,0,.45)}
.bo{background:0 0;color:var(--dark);border:1.5px solid var(--bd)}.bo:hover{border-color:var(--r);color:var(--r);transform:translateY(-2px)}
.slots{display:flex;align-items:center;gap:8px;width:100%}.strk{flex:1;height:5px;background:var(--bdl);border-radius:5px;overflow:hidden}.sfil{height:100%;background:linear-gradient(90deg,var(--r),var(--y));border-radius:5px;transition:width .6s}.slbl{font-size:11px;color:var(--td);font-weight:600;white-space:nowrap}
.badge{background:var(--rl);color:var(--r);padding:4px 10px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.5px;display:inline-block}
.tax{display:inline-block;font-size:11px;color:var(--td);margin-top:10px}
.foot{background:var(--dark);color:rgba(255,255,255,.55)}.foot a,.foot button{color:rgba(255,255,255,.45);transition:color .2s, transform .2s}.foot a:hover,.foot button:hover{color:#fff;transform:translateX(3px)}
.strip{background:var(--dark);padding:16px 24px;text-align:center;display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap;position:relative;overflow:hidden}
.strip::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 0%,var(--r) 25%,var(--y) 50%,var(--r) 75%,transparent 100%);background-size:200% 100%;animation:stripLine 6s linear infinite;opacity:.6}
@keyframes stripLine{0%{background-position:-200% 0}100%{background-position:200% 0}}
.strip p{color:rgba(255,255,255,.65);font-size:13px;margin:0;position:relative;z-index:1}
.strip .btn{position:relative;z-index:1}

/* HERO animations */
.hero-wrap{position:relative;overflow:hidden}
.hero-field{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:50px 50px;animation:fieldDrift 40s linear infinite;opacity:.7}
@keyframes fieldDrift{from{background-position:0 0}to{background-position:50px 50px}}
.hero-streak{position:absolute;height:2px;background:linear-gradient(90deg,transparent,var(--r),transparent);opacity:0;filter:blur(1px);animation:streak 7s linear infinite}
.hero-streak.s1{top:22%;width:35%;animation-delay:0s}
.hero-streak.s2{top:46%;width:50%;animation-delay:2.2s;background:linear-gradient(90deg,transparent,var(--y),transparent)}
.hero-streak.s3{top:72%;width:40%;animation-delay:4.5s}
@keyframes streak{0%{left:-40%;opacity:0}15%{opacity:.6}85%{opacity:.6}100%{left:110%;opacity:0}}
.hero-particle{position:absolute;width:4px;height:4px;border-radius:50%;background:var(--r);opacity:0;animation:particle 6s ease-in-out infinite}
.hero-particle.p1{top:30%;left:15%;animation-delay:.5s}
.hero-particle.p2{top:60%;left:80%;background:var(--y);animation-delay:1.8s}
.hero-particle.p3{top:80%;left:30%;animation-delay:3.2s}
.hero-particle.p4{top:20%;left:70%;background:var(--y);animation-delay:4s}
.hero-particle.p5{top:50%;left:50%;animation-delay:5.5s}
@keyframes particle{0%{opacity:0;transform:translateY(0) scale(.5)}20%{opacity:.8}50%{opacity:.5}100%{opacity:0;transform:translateY(-80px) scale(1.5)}}
.hero-logo{flex-shrink:0;position:relative;width:380px;height:380px;display:flex;align-items:center;justify-content:center;animation:logoIn 1.2s cubic-bezier(.2,.8,.2,1) both}
@keyframes logoIn{0%{opacity:0;transform:scale(.7) rotate(-8deg)}100%{opacity:1;transform:scale(1) rotate(0)}}
.hl-glow{position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle,rgba(255,0,36,.25) 0%,rgba(255,242,0,.12) 40%,transparent 70%);filter:blur(40px);animation:glowPulse 4s ease-in-out infinite}
@keyframes glowPulse{0%,100%{transform:scale(1);opacity:.9}50%{transform:scale(1.15);opacity:1}}
.hl-ring{position:absolute;border-radius:50%;border:1.5px solid rgba(255,0,36,.25);animation:ringSpin 20s linear infinite}
.hl-ring.r1{inset:10px}
.hl-ring.r2{inset:30px;border-color:rgba(255,242,0,.2);animation-direction:reverse;animation-duration:28s}
@keyframes ringSpin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.hl-img{position:relative;width:320px;height:320px;object-fit:contain;filter:drop-shadow(0 8px 40px rgba(255,0,36,.25)) drop-shadow(0 4px 20px rgba(0,0,0,.4));animation:logoFloat 6s ease-in-out infinite}
@keyframes logoFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

/* Scroll reveal */
.reveal{opacity:0;transform:translateY(24px);transition:opacity .8s cubic-bezier(.2,.8,.2,1), transform .8s cubic-bezier(.2,.8,.2,1)}
.reveal.in{opacity:1;transform:translateY(0)}
.reveal-d1{transition-delay:.1s}.reveal-d2{transition-delay:.2s}.reveal-d3{transition-delay:.3s}.reveal-d4{transition-delay:.4s}

/* Staggered hero text reveal */
.fadeUp{animation:fadeUp .9s cubic-bezier(.2,.8,.2,1) both}
.fadeUp.d1{animation-delay:.1s}.fadeUp.d2{animation-delay:.22s}.fadeUp.d3{animation-delay:.35s}.fadeUp.d4{animation-delay:.5s}.fadeUp.d5{animation-delay:.65s}.fadeUp.d6{animation-delay:.8s}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

/* Counter animation wrap */
.stat-card{position:relative;overflow:hidden;transition:transform .3s}
.stat-card:hover{transform:translateY(-3px)}
.stat-card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--r),var(--y));transform:scaleX(0);transform-origin:left;transition:transform .5s cubic-bezier(.2,.8,.2,1)}
.stat-card.revealed::before{transform:scaleX(1)}

/* Sports ticker */
.ticker-wrap{overflow:hidden;padding:8px 0;mask-image:linear-gradient(90deg,transparent,#000 10%,#000 90%,transparent);-webkit-mask-image:linear-gradient(90deg,transparent,#000 10%,#000 90%,transparent)}
.ticker{display:flex;gap:12px;width:max-content;animation:ticker 50s linear infinite}
.ticker:hover{animation-play-state:paused}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.sport-pill{padding:10px 20px;background:#fff;border:1px solid var(--bd);border-radius:30px;font-size:13px;font-weight:600;color:var(--tm);white-space:nowrap;transition:all .3s;flex-shrink:0}
.sport-pill:hover{border-color:var(--r);color:var(--r);transform:translateY(-2px);box-shadow:0 4px 12px rgba(255,0,36,.1)}

/* Live pulse dot */
.live-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--r);margin-right:8px;position:relative;vertical-align:middle}
.live-dot::before{content:"";position:absolute;inset:-4px;border-radius:50%;background:var(--r);opacity:.5;animation:livePulse 1.8s ease-out infinite}
@keyframes livePulse{0%{transform:scale(.8);opacity:.6}100%{transform:scale(2.2);opacity:0}}

/* Donation card hover shine */
.dcard{position:relative;overflow:hidden}
.dcard::after{content:"";position:absolute;top:-50%;left:-60%;width:40%;height:200%;background:linear-gradient(115deg,transparent,rgba(255,0,36,.08),transparent);transition:left .7s ease}
.dcard:hover::after{left:120%}

/* How it works connecting line */
.how-grid{position:relative}
.how-line{position:absolute;top:26px;left:10%;right:10%;height:2px;background:linear-gradient(90deg,var(--rl),var(--r),var(--y),var(--r),var(--rl));background-size:200% 100%;animation:howLine 4s linear infinite;z-index:0;opacity:0;transition:opacity 1s}
.how-grid.in .how-line{opacity:1}
@keyframes howLine{from{background-position:0 0}to{background-position:200% 0}}
.how-step{position:relative;z-index:1}
.how-circle{transition:transform .3s, box-shadow .3s}
.how-step:hover .how-circle{transform:scale(1.1);box-shadow:0 0 0 6px rgba(255,0,36,.08)}

/* Mission value cards */
.vcard{position:relative;overflow:hidden;transition:all .3s}
.vcard::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--r);transform:scaleY(0);transform-origin:top;transition:transform .4s cubic-bezier(.2,.8,.2,1)}
.vcard:hover{transform:translateX(4px);border-color:var(--r)}
.vcard:hover::before{transform:scaleY(1)}

/* Golf shootout featured card */
.golf-card{position:relative;overflow:hidden;transition:transform .4s, box-shadow .4s}
.golf-card:hover{transform:translateY(-3px);box-shadow:0 16px 40px rgba(0,0,0,.12)!important}
.golf-stripe{height:6px;background:linear-gradient(90deg,var(--r),var(--y),var(--r));background-size:200% 100%;animation:stripeMove 4s linear infinite}
@keyframes stripeMove{from{background-position:0 0}to{background-position:200% 0}}

/* CTA section */
.cta-box{position:relative;overflow:hidden}
.cta-box::before{content:"";position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--r),var(--y),var(--r),var(--y));background-size:300% 100%;animation:stripeMove 5s linear infinite}

/* Nav link underline */
.nav-link{position:relative}
.nav-link::after{content:"";position:absolute;bottom:4px;left:13px;right:13px;height:2px;background:var(--r);transform:scaleX(0);transform-origin:left;transition:transform .3s cubic-bezier(.2,.8,.2,1)}
.nav-link.active::after,.nav-link:hover::after{transform:scaleX(1)}

.hero-logo{flex-shrink:0;position:relative}

@media(max-width:768px){
.g2,.g3,.tg,.pg,.hg{grid-template-columns:1fr!important}.sg,.ag{grid-template-columns:1fr!important}
.fr2,.fr3{grid-template-columns:1fr!important}.fg{grid-template-columns:1fr 1fr!important;gap:24px!important}
.c{padding:0 16px}.htl{font-size:34px!important}.stg{grid-template-columns:1fr 1fr 1fr!important}
.sa{display:none!important}.cr{flex-direction:column;align-items:stretch}
.hero-logo{display:none!important}.hero-logo-mobile{display:block!important}
.nav-desktop{display:none!important}.nav-mobile-right{display:flex!important}
.sr{flex-direction:column;gap:10px!important}.sr>div:first-child{flex:none!important;width:100%!important}.sr .fi{font-size:16px!important}
.pls{overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap!important}.pls button{flex-shrink:0;padding:8px 12px!important;font-size:11px!important}
.schg{grid-template-columns:1fr!important}.es{grid-template-columns:1fr!important}.dg{grid-template-columns:1fr 1fr!important}
.strip{flex-direction:column;gap:10px}.navl{gap:0!important}.navl button{padding:7px 5px!important;font-size:10px!important}.navd{padding:7px 12px!important;font-size:10px!important;margin-left:3px!important}
.how-line{display:none}
}
@media(max-width:480px){.stg>div{padding:18px 10px!important}.dg{grid-template-columns:1fr!important}.navl button{padding:5px 3px!important;font-size:9px!important}.navd{font-size:9px!important;padding:6px 10px!important}}

.page-logo{float:right;width:200px;height:200px;object-fit:contain;margin-left:20px;margin-bottom:10px}
@media(max-width:768px){.page-logo{float:none;display:block;width:80px;height:80px;margin:0 auto 12px}}

@media(prefers-reduced-motion:reduce){
*,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}
.reveal{opacity:1;transform:none}
}
</style>

<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const{useState,useRef,useCallback,useEffect}=React;
const LOGO="images/dbysf-logo.png";
const LOGO_NAV="images/dbysf-logo.png";
const hf="'Barlow Condensed',sans-serif";
const SCH=[{id:1,title:"Spring Sports Registration",sponsor:"Community Partner",amount:100,type:"Registration",deadline:"Apr 30, 2026",slots:15,filled:6,desc:"Covers league registration for spring sports including soccer, baseball, lacrosse, and softball."},{id:2,title:"Equipment & Gear Grant",sponsor:"Local Business Sponsor",amount:75,type:"Equipment",deadline:"May 15, 2026",slots:20,filled:9,desc:"Provides essential gear - cleats, gloves, shin guards, helmets, or sport-specific equipment."},{id:3,title:"Tournament Travel Fund",sponsor:"Regional Partner",amount:200,type:"Travel",deadline:"Jun 1, 2026",slots:8,filled:2,desc:"Helps families cover travel costs for tournaments and showcase events."},{id:4,title:"Summer Camp Scholarship",sponsor:"Community Donor",amount:125,type:"Camp",deadline:"May 30, 2026",slots:12,filled:0,desc:"Coverage for summer sports camps and clinics. Ages 6-16, any sport."},{id:5,title:"Fall League Assistance",sponsor:"Foundation Fund",amount:150,type:"Registration",deadline:"Jul 15, 2026",slots:10,filled:0,desc:"Covers fall registration for football, field hockey, soccer, and more."},{id:6,title:"Multi-Sport Athlete Grant",sponsor:"Delmarva Blast Fund",amount:175,type:"Registration",deadline:"Jun 15, 2026",slots:6,filled:1,desc:"For athletes in two or more sports. Partial registration across seasons."}];
const STR=[{name:"The Martinez Family",loc:"Salisbury, MD",q:"Our daughter watched from the car while her brother practiced. We could not afford two registrations. The scholarship changed that. Now she is on the field every Saturday.",sp:"Soccer"},{name:"Jayden, Age 9",loc:"Ocean City, MD",q:"He played in borrowed cleats two sizes too big. When the new gear arrived he slept with the box next to his bed.",sp:"Baseball"},{name:"The Davis Family",loc:"Dover, DE",q:"I work two jobs and my son is one of the best on his team. Telling him we could not afford the league fee was the hardest conversation I have had as a parent.",sp:"Basketball"},{name:"Coach Williams",loc:"Cambridge, MD",q:"Every season kids disappear from the roster because families cannot keep up with fees. This program actually addresses it at scale.",sp:"Football"}];
const TIERS=[{name:"STARTER",range:"$50-$99",impact:"1 athlete equipped",perks:["Named scholarship listing","Sponsor page recognition","Season impact summary"]},{name:"CHAMPION",range:"$100-$299",impact:"1-2 full registrations",perks:["Everything in Starter","Featured placement","Social media recognition","Logo on materials"],pop:true},{name:"MVP",range:"$300+",impact:"3-5 athletes supported",perks:["Everything in Champion","Premium placement","Impact reports","Thank-you letters","Event signage"]}];
const SPORTS=["Soccer","Baseball","Basketball","Football","Lacrosse","Field Hockey","Softball","Wrestling","Track & Field","Tennis","Golf","Volleyball","Swimming","Cheerleading","Gymnastics","Hockey"];
const TYPES=["All",...new Set(SCH.map(s=>s.type))];

/* ============ REVEAL HOOK ============ */
function useReveal(){
  const ref=useRef(null);
  useEffect(()=>{
    const el=ref.current;if(!el)return;
    const io=new IntersectionObserver((entries)=>{
      entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add("in");if(e.target.classList.contains("stat-card"))e.target.classList.add("revealed");io.unobserve(e.target)}})
    },{threshold:.15,rootMargin:"0px 0px -40px 0px"});
    io.observe(el);
    return()=>io.disconnect();
  },[]);
  return ref;
}

/* ============ ANIMATED COUNTER ============ */
function Counter({value,suffix="",duration=1500}){
  const [display,setDisplay]=useState(0);
  const ref=useRef(null);
  const started=useRef(false);
  useEffect(()=>{
    const el=ref.current;if(!el)return;
    const io=new IntersectionObserver((entries)=>{
      entries.forEach(e=>{
        if(e.isIntersecting && !started.current){
          started.current=true;
          const num=parseInt(String(value).replace(/\D/g,""))||0;
          const start=performance.now();
          const tick=(now)=>{
            const t=Math.min(1,(now-start)/duration);
            const eased=1-Math.pow(1-t,3);
            setDisplay(Math.floor(eased*num));
            if(t<1)requestAnimationFrame(tick);
            else setDisplay(num);
          };
          requestAnimationFrame(tick);
          io.unobserve(el);
        }
      });
    },{threshold:.4});
    io.observe(el);
    return()=>io.disconnect();
  },[value,duration]);
  return <span ref={ref}>{display}{suffix}</span>;
}

function SB({f,t}){const p=Math.round(f/t*100);return <div className="slots"><div className="strk"><div className="sfil" style={{width:p+"%"}}/></div><span className="slbl">{t-f} left</span></div>}
function Tax(){return <div className="tax">501(c)(3) Nonprofit Organization</div>}

function Nav({page,go}){
  const[open,setOpen]=useState(false);
  const[scrolled,setScrolled]=useState(false);
  const nav=[{k:"home",l:"Home"},{k:"scholarships",l:"Apply"},{k:"events",l:"Events"},{k:"sponsors",l:"Sponsors"},{k:"about",l:"About"}];
  const tap=(k)=>{go(k);setOpen(false)};
  useEffect(()=>{
    const onScroll=()=>setScrolled(window.scrollY>20);
    window.addEventListener("scroll",onScroll,{passive:true});
    return()=>window.removeEventListener("scroll",onScroll);

  return <div className="hero-wrap" style={{background:"var(--dark)",position:"relative",overflow:"hidden",marginLeft:"calc(50% - 50vw)",marginRight:"calc(50% - 50vw)",marginTop:-8,marginBottom:40}}>
    <div className="hero-field" style={{opacity:.5}}/>
    <div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse 70% 70% at 75% 30%,rgba(255,0,36,.12) 0%,transparent 60%),radial-gradient(ellipse 50% 50% at 20% 80%,rgba(255,242,0,.06) 0%,transparent 50%)"}}/>
    <div className="hero-streak s1"/>
    <div className="hero-streak s2"/>
    <div style={{maxWidth:1200,margin:"0 auto",padding:"44px 16px 52px",position:"relative",zIndex:1}}>
      <div className="hg" style={{display:"grid",gridTemplateColumns:"1fr auto",gap:40,alignItems:"center"}}>
        <div>
          <div className="fadeUp d1" style={{fontSize:11,fontWeight:700,color:"var(--y)",letterSpacing:3,textTransform:"uppercase",marginBottom:14}}>{eyebrow}</div>
          <h1 className="hd htl fadeUp d2" style={{fontSize:46,marginBottom:14,maxWidth:560,color:"#fff",lineHeight:1.05}}>{title} <span style={{color:"var(--y)"}}>{titleHi}</span></h1>
          <p className="fadeUp d3" style={{color:"rgba(255,255,255,.65)",fontSize:16,lineHeight:1.7,marginBottom:18,maxWidth:520}}>{subtitle}</p>
          <div className="hero-logo-mobile" style={{display:"none"}}><img src={LOGO} alt="Delmarva Blast" style={{width:140,height:140,objectFit:"contain",filter:"drop-shadow(0 6px 24px rgba(255,0,36,.25))",display:"block",margin:"0 auto 20px"}}/></div>
          <div className="fadeUp d4" style={{color:"rgba(255,255,255,.45)",fontSize:11}}>501(c)(3) Nonprofit Organization</div>
        </div>
        <div className="hero-logo" style={{width:220,height:220,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div className="hl-glow"/>
          <div className="hl-ring r1"/>
          <img src={LOGO} alt="Delmarva Blast" className="hl-img" style={{width:200,height:200}}/>
        </div>
      </div>
    </div>
  </div>;
}

function Scholarships({go}){
  const[step,setStep]=useState(0);const[sending,setSending]=useState(false);const[err,setErr]=useState("");
  const[form,setForm]=useState({pn:"",pe:"",pp:"",pa:"",cn:"",cby:"",ca:"",cs:"",csc:"",aReg:false,aUni:false,aShoe:false,aa:"",on:"",oc:"",oe:"",op:"",reason:""});
  const upd=useCallback((k,v)=>setForm(p=>({...p,[k]:v})),[]);
  const reset=()=>{setStep(0);setErr("");setForm({pn:"",pe:"",pp:"",pa:"",cn:"",cby:"",ca:"",cs:"",csc:"",aReg:false,aUni:false,aShoe:false,aa:"",on:"",oc:"",oe:"",op:"",reason:""})};
  const submitForm=async()=>{
    const req=[form.pn,form.pe,form.pp,form.pa,form.cn,form.cby,form.ca,form.cs,form.csc,form.aa,form.on,form.oc,form.oe,form.reason];
    if(req.some(v=>!v||String(v).trim()==="")){setErr("Please fill out all required fields.");return}
    if(!form.aReg&&!form.aUni&&!form.aShoe){setErr("Please select at least one type of assistance.");return}
    setErr("");setSending(true);
    const assist=[];if(form.aReg)assist.push("League/Season Registration");if(form.aUni)assist.push("Uniform Assistance");if(form.aShoe)assist.push("Shoes/Equipment");
    try{
      const res=await fetch("https://api.web3forms.com/submit",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({access_key:"920b074d-603e-4e38-949b-7624e13ab0a3",botcheck:"",subject:"New Scholarship Application - "+form.cn,from_name:"Delmarva Blast YSF Website","Parent/Guardian Name":form.pn,"Parent/Guardian Email":form.pe,"Parent/Guardian Phone":form.pp,"Address":form.pa,"Athlete Name":form.cn,"Birth Year":form.cby,"Current Age":form.ca,"Sport":form.cs,"Current School":form.csc,"Assistance Needed":assist.join(", "),"Amount Requested":"$"+form.aa,"Organization Name":form.on,"Organization Contact":form.oc,"Organization Email":form.oe,"Organization Phone":form.op||"Not provided","Story":form.reason})});
      const data=await res.json();
      if(data.success){setStep(1)}else{setErr("Something went wrong. Please try again or email coachrusty@outlook.com directly.")}
    }catch(e){setErr("Something went wrong. Please try again or email coachrusty@outlook.com directly.")}
    finally{setSending(false)}
  };
  if(step===1)return <div className="c" style={{maxWidth:520,paddingTop:56,paddingBottom:100,textAlign:"center",animation:"fadeUp .6s both"}}>
    <div style={{width:64,height:64,borderRadius:"50%",background:"var(--rl)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 22px",animation:"glowPulse 2s ease-in-out infinite"}}><div style={{width:22,height:11,borderLeft:"3px solid var(--r)",borderBottom:"3px solid var(--r)",transform:"rotate(-45deg)",marginTop:-3}}/></div>
    <h2 className="hd" style={{fontSize:28,marginBottom:12}}>APPLICATION SUBMITTED</h2>
    <p style={{color:"var(--tm)",fontSize:15,lineHeight:1.7,marginBottom:12}}>Thank you for applying to the Delmarva Blast Youth Sports Foundation. We will review your application and be in touch within 7 business days.</p>
    <p style={{color:"var(--td)",fontSize:13,marginBottom:28}}>All information is kept strictly confidential.</p>
    <button onClick={reset} className="btn br">Back to Home</button>
  </div>;
  return <div className="c" style={{paddingTop:8,paddingBottom:56}}>
    <PageHero eyebrow="Get Involved / Scholarships" title="APPLY FOR A" titleHi="SCHOLARSHIP" subtitle="Financial assistance for youth athletes across the Delmarva Peninsula. Fill out the application below and we will review it within 7 business days."/>
    <div className="card reveal in" style={{overflow:"hidden",maxWidth:680,opacity:1,transform:"none",animation:"fadeUp .6s .2s both"}}>
      <div className="golf-stripe" style={{height:4}}/>
      <div style={{padding:32}}>
        <div style={{display:"flex",flexDirection:"column",gap:18}}>

          <div style={{fontSize:11,fontWeight:700,color:"var(--r)",letterSpacing:2,textTransform:"uppercase",paddingBottom:6,borderBottom:"1px solid var(--bd)"}}>Parent / Guardian Information</div>
          <div><label className="fl">Full Name *</label><input className="fi" value={form.pn} onChange={e=>upd("pn",e.target.value)} placeholder="Jane Smith"/></div>
          <div className="fr2" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}><div><label className="fl">Email *</label><input className="fi" type="email" value={form.pe} onChange={e=>upd("pe",e.target.value)} placeholder="jane@email.com"/></div><div><label className="fl">Phone *</label><input className="fi" type="tel" value={form.pp} onChange={e=>upd("pp",e.target.value)} placeholder="(410) 555-0123"/></div></div>
          <div><label className="fl">Address (City, State) *</label><input className="fi" value={form.pa} onChange={e=>upd("pa",e.target.value)} placeholder="Salisbury, MD"/></div>

          <div style={{fontSize:11,fontWeight:700,color:"var(--r)",letterSpacing:2,textTransform:"uppercase",paddingBottom:6,borderBottom:"1px solid var(--bd)",marginTop:8}}>Athlete Information</div>
          <div><label className="fl">Athlete Name *</label><input className="fi" value={form.cn} onChange={e=>upd("cn",e.target.value)} placeholder="Alex Smith"/></div>
          <div className="fr3" style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}><div><label className="fl">Birth Year *</label><input className="fi" type="number" value={form.cby} onChange={e=>upd("cby",e.target.value)} placeholder="2015"/></div><div><label className="fl">Current Age *</label><input className="fi" type="number" value={form.ca} onChange={e=>upd("ca",e.target.value)} placeholder="10"/></div><div><label className="fl">Sport *</label><input className="fi" value={form.cs} onChange={e=>upd("cs",e.target.value)} placeholder="Soccer"/></div></div>
          <div><label className="fl">Current School Attending *</label><input className="fi" value={form.csc} onChange={e=>upd("csc",e.target.value)} placeholder="Salisbury Middle School"/></div>

          <div style={{fontSize:11,fontWeight:700,color:"var(--r)",letterSpacing:2,textTransform:"uppercase",paddingBottom:6,borderBottom:"1px solid var(--bd)",marginTop:8}}>Assistance Needed</div>
          <div><label className="fl">Type of Assistance (select all that apply) *</label>
            <div style={{display:"flex",flexDirection:"column",gap:10,marginTop:6}}>
              {[{k:"aReg",l:"League / Season Registration"},{k:"aUni",l:"Uniform Assistance"},{k:"aShoe",l:"Shoes / Equipment"}].map(cb=><label key={cb.k} style={{display:"flex",alignItems:"center",gap:8,fontSize:14,color:"var(--text)",cursor:"pointer",transition:"color .2s"}} onMouseEnter={e=>e.currentTarget.style.color="var(--r)"} onMouseLeave={e=>e.currentTarget.style.color="var(--text)"}><input type="checkbox" checked={form[cb.k]} onChange={e=>upd(cb.k,e.target.checked)} style={{width:18,height:18,accentColor:"var(--r)",cursor:"pointer"}}/>{cb.l}</label>)}
            </div>
          </div>
          <div><label className="fl">Amount Requested ($) *</label><input className="fi" type="number" value={form.aa} onChange={e=>upd("aa",e.target.value)} placeholder="150"/></div>

          <div style={{fontSize:11,fontWeight:700,color:"var(--r)",letterSpacing:2,textTransform:"uppercase",paddingBottom:6,borderBottom:"1px solid var(--bd)",marginTop:8}}>Organization to Receive Payment</div>
          <p style={{fontSize:12,color:"var(--td)",lineHeight:1.6,margin:0}}>If approved, the Delmarva Blast Youth Sports Foundation pays the organization directly on your behalf.</p>
          <div className="fr2" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}><div><label className="fl">Organization Name *</label><input className="fi" value={form.on} onChange={e=>upd("on",e.target.value)} placeholder="Salisbury Youth Soccer League"/></div><div><label className="fl">Contact Person *</label><input className="fi" value={form.oc} onChange={e=>upd("oc",e.target.value)} placeholder="John Doe, Registrar"/></div></div>
          <div className="fr2" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}><div><label className="fl">Organization Email *</label><input className="fi" type="email" value={form.oe} onChange={e=>upd("oe",e.target.value)} placeholder="info@league.com"/></div><div><label className="fl">Organization Phone</label><input className="fi" type="tel" value={form.op} onChange={e=>upd("op",e.target.value)} placeholder="(410) 555-0000"/></div></div>

          <div style={{fontSize:11,fontWeight:700,color:"var(--r)",letterSpacing:2,textTransform:"uppercase",paddingBottom:6,borderBottom:"1px solid var(--bd)",marginTop:8}}>Your Story</div>
          <div><label className="fl">Tell us why your family needs assistance and how this would help your athlete *</label><textarea className="fi" style={{minHeight:100,resize:"vertical"}} value={form.reason} onChange={e=>upd("reason",e.target.value)} placeholder="Share a bit about your family's situation and what playing this sport means to your child..."/></div>

          <div style={{background:"var(--bgA)",border:"1px solid var(--bd)",borderRadius:6,padding:14,fontSize:12,color:"var(--td)",lineHeight:1.65}}>Applications are reviewed on a rolling basis. You will hear back within 7 business days. All information is kept strictly confidential. The Delmarva Blast Youth Sports Foundation is a 501(c)(3) nonprofit organization.</div>
          {err&&<div style={{background:"rgba(255,0,36,.06)",border:"1px solid rgba(255,0,36,.2)",borderRadius:6,padding:12,fontSize:13,color:"var(--r)",fontWeight:600,animation:"fadeUp .3s both"}}>{err}</div>}
          <button onClick={submitForm} disabled={sending} className="btn br" style={{width:"100%",padding:"15px",opacity:sending?.6:1,cursor:sending?"not-allowed":"pointer"}}>{sending?"Submitting...":"Submit Application"}</button>
        </div>
      </div>
    </div>
  </div>;
}
