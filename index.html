<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<meta name="description" content="Delmarva Blast Youth Sports Foundation - 501(c)(3) nonprofit providing scholarships for youth athletes across the Delmarva Peninsula."/>
<title>Delmarva Blast Youth Sports Foundation</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--r:#FF0024;--rd:#D9001F;--rl:rgba(255,0,36,.06);--y:#FFF200;--yd:#E0D400;--yl:rgba(255,242,0,.08);--bg:#fff;--bgA:#f8f7f4;--dark:#111;--text:#1a1a1a;--tm:#5a5650;--td:#8a847a;--tf:#c8c3ba;--bd:#e8e4de;--bdl:#f0ece6}
*{margin:0;padding:0;box-sizing:border-box}::selection{background:rgba(255,0,36,.12);color:var(--r)}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Source Sans 3',sans-serif}body{overflow-x:hidden}
a{text-decoration:none;color:inherit}button{font-family:inherit;cursor:pointer}
input::placeholder,textarea::placeholder{color:var(--tf)}
input:focus,textarea:focus{border-color:var(--r)!important;outline:none;box-shadow:0 0 0 3px var(--rl)}
.fi{width:100%;padding:13px 16px;border-radius:6px;border:1px solid var(--bd);font-size:14px;font-family:inherit;color:var(--text);background:var(--bg);-webkit-appearance:none;transition:border-color .2s}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}input[type=number]{-moz-appearance:textfield}
.fl{font-size:10px;font-weight:700;color:var(--td);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;display:block}
.c{max-width:1100px;margin:0 auto;padding:0 24px}
.card{background:#fff;border:1px solid var(--bd);border-radius:10px;transition:border-color .2s,transform .2s,box-shadow .2s}
.card:hover{border-color:#d4d0c8}.cc{cursor:pointer}.cc:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.06);border-color:rgba(255,0,36,.15)}
.hd{font-family:'Barlow Condensed',sans-serif;font-weight:800;text-transform:uppercase;line-height:1.05;color:var(--dark)}
.tag{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--r);margin-bottom:10px}
.al{width:48px;height:3px;background:var(--r);margin-bottom:16px;border-radius:2px}.alc{margin-left:auto;margin-right:auto}
.btn{display:inline-block;padding:14px 32px;border-radius:6px;font-size:14px;font-weight:700;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;text-transform:uppercase;transition:all .2s;border:none;text-align:center}
.br{background:var(--r);color:#fff}.br:hover{background:var(--rd)}
.by{background:var(--y);color:var(--dark)}.by:hover{filter:brightness(.92)}
.bo{background:0 0;color:var(--dark);border:1.5px solid var(--bd)}.bo:hover{border-color:var(--r);color:var(--r)}
.slots{display:flex;align-items:center;gap:8px;width:100%}.strk{flex:1;height:5px;background:var(--bdl);border-radius:5px;overflow:hidden}.sfil{height:100%;background:linear-gradient(90deg,var(--r),var(--y));border-radius:5px;transition:width .6s}.slbl{font-size:11px;color:var(--td);font-weight:600;white-space:nowrap}
.badge{background:var(--rl);color:var(--r);padding:4px 10px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.5px;display:inline-block}
.tax{display:inline-block;font-size:11px;color:var(--td);margin-top:10px}
.foot{background:var(--dark);color:rgba(255,255,255,.55)}.foot a,.foot button{color:rgba(255,255,255,.45)}.foot a:hover,.foot button:hover{color:#fff}
.strip{background:var(--dark);padding:16px 24px;text-align:center;display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap}
.strip p{color:rgba(255,255,255,.65);font-size:13px;margin:0}
.hero-logo{flex-shrink:0;position:relative;width:360;height:360;display:flex;align-items:center;justify-content:center}
.hero-logo .hl-circle{position:relative;width:280px;height:280px}
.hero-logo .hl-circle img{width:200px;height:200px}
@media(max-width:768px){
.g2,.g3,.tg,.pg,.hg{grid-template-columns:1fr!important}.sg,.ag{grid-template-columns:1fr!important}
.fr2,.fr3{grid-template-columns:1fr!important}.fg{grid-template-columns:1fr 1fr!important;gap:24px!important}
.c{padding:0 16px}.htl{font-size:34px!important}.stg{grid-template-columns:1fr 1fr 1fr!important}
.sa{display:none!important}.cr{flex-direction:column;align-items:stretch}
.hero-logo{display:none!important}.hero-logo-mobile{display:block!important}
.nav-desktop{display:none!important}.nav-mobile-right{display:flex!important}
.sr{flex-direction:column;gap:10px!important}.sr>div:first-child{flex:none!important;width:100%!important}.sr .fi{font-size:16px!important}
.pls{overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap!important}.pls button{flex-shrink:0;padding:8px 12px!important;font-size:11px!important}
.schg{grid-template-columns:1fr!important}.es{grid-template-columns:1fr!important}.dg{grid-template-columns:1fr 1fr!important}
.strip{flex-direction:column;gap:10px}.navl{gap:0!important}.navl button{padding:7px 5px!important;font-size:10px!important}.navd{padding:7px 12px!important;font-size:10px!important;margin-left:3px!important}
}
@media(max-width:480px){.stg>div{padding:18px 10px!important}.dg{grid-template-columns:1fr!important}.navl button{padding:5px 3px!important;font-size:9px!important}.navd{font-size:9px!important;padding:6px 10px!important}}

.page-logo{float:right;width:200px;height:200px;object-fit:contain;margin-left:20px;margin-bottom:10px}
@media(max-width:768px){.page-logo{float:none;display:block;width:80px;height:80px;margin:0 auto 12px}}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const{useState,useRef,useCallback}=React;
const LOGO="images/dbysf-logo.png";
const LOGO_NAV="images/dbysf-logo.png";
const hf="'Barlow Condensed',sans-serif";
const SCH=[{id:1,title:"Spring Sports Registration",sponsor:"Community Partner",amount:100,type:"Registration",deadline:"Apr 30, 2026",slots:15,filled:6,desc:"Covers league registration for spring sports including soccer, baseball, lacrosse, and softball."},{id:2,title:"Equipment & Gear Grant",sponsor:"Local Business Sponsor",amount:75,type:"Equipment",deadline:"May 15, 2026",slots:20,filled:9,desc:"Provides essential gear - cleats, gloves, shin guards, helmets, or sport-specific equipment."},{id:3,title:"Tournament Travel Fund",sponsor:"Regional Partner",amount:200,type:"Travel",deadline:"Jun 1, 2026",slots:8,filled:2,desc:"Helps families cover travel costs for tournaments and showcase events."},{id:4,title:"Summer Camp Scholarship",sponsor:"Community Donor",amount:125,type:"Camp",deadline:"May 30, 2026",slots:12,filled:0,desc:"Coverage for summer sports camps and clinics. Ages 6-16, any sport."},{id:5,title:"Fall League Assistance",sponsor:"Foundation Fund",amount:150,type:"Registration",deadline:"Jul 15, 2026",slots:10,filled:0,desc:"Covers fall registration for football, field hockey, soccer, and more."},{id:6,title:"Multi-Sport Athlete Grant",sponsor:"Delmarva Blast Fund",amount:175,type:"Registration",deadline:"Jun 15, 2026",slots:6,filled:1,desc:"For athletes in two or more sports. Partial registration across seasons."}];
const STR=[{name:"The Martinez Family",loc:"Salisbury, MD",q:"Our daughter watched from the car while her brother practiced. We could not afford two registrations. The scholarship changed that. Now she is on the field every Saturday.",sp:"Soccer"},{name:"Jayden, Age 9",loc:"Ocean City, MD",q:"He played in borrowed cleats two sizes too big. When the new gear arrived he slept with the box next to his bed.",sp:"Baseball"},{name:"The Davis Family",loc:"Dover, DE",q:"I work two jobs and my son is one of the best on his team. Telling him we could not afford the league fee was the hardest conversation I have had as a parent.",sp:"Basketball"},{name:"Coach Williams",loc:"Cambridge, MD",q:"Every season kids disappear from the roster because families cannot keep up with fees. This program actually addresses it at scale.",sp:"Football"}];
const TIERS=[{name:"STARTER",range:"$50-$99",impact:"1 athlete equipped",perks:["Named scholarship listing","Sponsor page recognition","Season impact summary"]},{name:"CHAMPION",range:"$100-$299",impact:"1-2 full registrations",perks:["Everything in Starter","Featured placement","Social media recognition","Logo on materials"],pop:true},{name:"MVP",range:"$300+",impact:"3-5 athletes supported",perks:["Everything in Champion","Premium placement","Impact reports","Thank-you letters","Event signage"]}];
const SPORTS=["Soccer","Baseball","Basketball","Football","Lacrosse","Field Hockey","Softball","Wrestling","Track & Field","Tennis","Golf","Volleyball","Swimming","Cheerleading","Gymnastics","Hockey"];
const TYPES=["All",...new Set(SCH.map(s=>s.type))];

function SB({f,t}){const p=Math.round(f/t*100);return <div className="slots"><div className="strk"><div className="sfil" style={{width:p+"%"}}/></div><span className="slbl">{t-f} left</span></div>}
function Tax(){return <div className="tax">501(c)(3) Nonprofit Organization</div>}

function Nav({page,go}){const[open,setOpen]=useState(false);const nav=[{k:"home",l:"Home"},{k:"scholarships",l:"Apply"},{k:"events",l:"Events"},{k:"sponsors",l:"Sponsors"},{k:"about",l:"About"}];const tap=(k)=>{go(k);setOpen(false)};return <><nav style={{borderBottom:"1px solid var(--bd)",background:"var(--bg)",position:"sticky",top:0,zIndex:100}}><div className="c" style={{display:"flex",justifyContent:"space-between",alignItems:"center",height:72}}><button onClick={()=>tap("home")} style={{background:"none",border:"none",padding:0,display:"flex",alignItems:"center",gap:10}}><img src={LOGO_NAV} alt="DB" style={{height:52}}/></button><div className="navl nav-desktop" style={{display:"flex",alignItems:"center",gap:2}}>{nav.map(x=><button key={x.k} onClick={()=>tap(x.k)} style={{background:page===x.k?"var(--rl)":"none",color:page===x.k?"var(--r)":"var(--tm)",border:"none",padding:"8px 13px",borderRadius:4,fontSize:12.5,fontWeight:600}}>{x.l}</button>)}<button className="navd" onClick={()=>window.open("https://buy.stripe.com/cNi00j6Ndd9q9yHez93VC01","_blank")} style={{background:"var(--r)",color:"#fff",border:"none",padding:"9px 20px",borderRadius:6,fontSize:12,fontWeight:700,fontFamily:hf,letterSpacing:1,textTransform:"uppercase",marginLeft:6}}>Donate Now</button></div><div className="nav-mobile-right" style={{display:"none",alignItems:"center",gap:10}}><button onClick={()=>window.open("https://buy.stripe.com/cNi00j6Ndd9q9yHez93VC01","_blank")} style={{background:"var(--r)",color:"#fff",border:"none",padding:"7px 14px",borderRadius:6,fontSize:11,fontWeight:700,fontFamily:hf,letterSpacing:1,textTransform:"uppercase"}}>Donate Now</button><button onClick={()=>setOpen(!open)} style={{background:"none",border:"none",padding:8,cursor:"pointer"}}><div style={{width:24,height:2,background:"var(--dark)",marginBottom:6,borderRadius:2,transition:"all .3s",transform:open?"rotate(45deg) translate(3px,3px)":"none"}}/><div style={{width:24,height:2,background:"var(--dark)",marginBottom:6,borderRadius:2,transition:"all .3s",opacity:open?0:1}}/><div style={{width:24,height:2,background:"var(--dark)",borderRadius:2,transition:"all .3s",transform:open?"rotate(-45deg) translate(3px,-3px)":"none"}}/></button></div></div></nav>{open&&<div style={{position:"fixed",top:72,left:0,right:0,bottom:0,background:"var(--bg)",zIndex:99,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8}}>{nav.map(x=><button key={x.k} onClick={()=>tap(x.k)} style={{background:page===x.k?"var(--rl)":"none",color:page===x.k?"var(--r)":"var(--dark)",border:"none",padding:"16px 40px",borderRadius:8,fontSize:20,fontWeight:700,fontFamily:hf,letterSpacing:1,textTransform:"uppercase",width:"80%",maxWidth:320}}>{x.l}</button>)}<button onClick={()=>window.open("https://buy.stripe.com/cNi00j6Ndd9q9yHez93VC01","_blank")} style={{background:"var(--r)",color:"#fff",border:"none",padding:"16px 40px",borderRadius:8,fontSize:20,fontWeight:700,fontFamily:hf,letterSpacing:1,textTransform:"uppercase",width:"80%",maxWidth:320,marginTop:8}}>Donate Now</button></div>}</>}

function Strip({go}){return <div className="strip"><p>Every kid deserves the chance to play.</p><button onClick={()=>go("scholarships")} className="btn" style={{background:"#fff",color:"var(--dark)",padding:"8px 18px",fontSize:11,border:"none",borderRadius:6,fontFamily:hf,fontWeight:700,letterSpacing:1,textTransform:"uppercase"}}>Apply</button><button onClick={()=>go("donate")} className="btn br" style={{padding:"8px 18px",fontSize:11}}>Support an Athlete</button></div>}

function Foot({go}){return <footer className="foot"><div className="c fg" style={{paddingTop:48,paddingBottom:20,display:"grid",gridTemplateColumns:"2fr 1fr 1fr",gap:40}}><div><div style={{fontFamily:hf,fontSize:18,fontWeight:800,textTransform:"uppercase",letterSpacing:1,marginBottom:4,color:"#fff"}}>DELMARVA BLAST</div><div style={{color:"var(--r)",fontSize:10,fontWeight:700,letterSpacing:2,marginBottom:12}}>YOUTH SPORTS FOUNDATION</div><p style={{fontSize:13,lineHeight:1.7,maxWidth:280}}>A 501(c)(3) nonprofit providing scholarships for youth athletes across the Delmarva Peninsula.</p></div><div><div style={{color:"var(--y)",fontSize:10,fontWeight:700,letterSpacing:2.5,marginBottom:14}}>NAVIGATE</div>{[["Home","home"],["Apply","scholarships"],["Events","events"],["Sponsors","sponsors"],["Donate","donate"],["About","about"]].map(([l,t])=><button key={t} onClick={()=>go(t)} style={{display:"block",background:"none",border:"none",fontSize:13,fontFamily:"inherit",padding:"3px 0"}}>{l}</button>)}</div><div><div style={{color:"var(--y)",fontSize:10,fontWeight:700,letterSpacing:2.5,marginBottom:14}}>CONTACT</div><div style={{fontSize:13,lineHeight:2}}>Rusty Brown, Executive Director<br/>coachrusty@outlook.com<br/>(410) 713-8174<br/>Salisbury, MD</div></div></div><div className="c" style={{padding:"16px 24px",borderTop:"1px solid rgba(255,255,255,.08)",display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8}}><span style={{fontSize:11,color:"rgba(255,255,255,.25)"}}>2026 Delmarva Blast Youth Sports Foundation, Inc.</span><span style={{fontSize:11,color:"rgba(255,255,255,.25)"}}>delmarvablast.org</span></div></footer>}

function Home({go}){return <><div style={{background:"var(--dark)",position:"relative",overflow:"hidden"}}><div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse 70% 70% at 75% 30%,rgba(255,0,36,.12) 0%,transparent 60%),radial-gradient(ellipse 50% 50% at 20% 80%,rgba(255,242,0,.06) 0%,transparent 50%)"}}/>
<div className="c" style={{position:"relative",zIndex:1,paddingTop:56,paddingBottom:72}}><div className="hg" style={{display:"grid",gridTemplateColumns:"1fr auto",gap:40,alignItems:"center"}}><div><div style={{fontFamily:hf,fontSize:28,fontWeight:900,color:"#fff",letterSpacing:2,textTransform:"uppercase",lineHeight:1.1,marginBottom:2}}>DELMARVA BLAST</div><div style={{fontFamily:hf,fontSize:28,fontWeight:900,color:"#fff",letterSpacing:2,textTransform:"uppercase",lineHeight:1.1,marginBottom:4}}>YOUTH SPORTS FOUNDATION</div><div style={{fontSize:14,fontWeight:600,color:"var(--y)",letterSpacing:3,textTransform:"uppercase",marginBottom:24}}>Scholarship Fund</div><h1 className="hd htl" style={{fontSize:56,marginBottom:18,maxWidth:640,color:"#fff"}}>EVERY KID DESERVES THE CHANCE TO <span style={{color:"var(--y)"}}>PLAY.</span></h1><p style={{color:"rgba(255,255,255,.6)",fontSize:17,lineHeight:1.75,marginBottom:32,maxWidth:500}}>Providing scholarships for youth athletes across Delaware, Maryland, and Virginia's Eastern Shore. All sports. All kids. No barriers.</p><div className="hero-logo-mobile" style={{display:"none"}}><img src={LOGO} alt="Delmarva Blast" style={{width:180,height:180,objectFit:"contain",filter:"drop-shadow(0 8px 30px rgba(255,0,36,.3))",display:"block",margin:"0 auto 24px"}}/></div><div className="cr" style={{display:"flex",gap:12,flexWrap:"wrap"}}><button onClick={()=>go("scholarships")} className="btn br" style={{border:"2px solid #fff"}}>Apply for a Scholarship</button><button onClick={()=>go("donate")} className="btn by" style={{border:"2px solid #fff"}}>Support an Athlete</button><button onClick={()=>go("sponsors")} className="btn" style={{background:"transparent",color:"#fff",border:"2px solid #fff"}}>Become a Sponsor</button></div><div style={{color:"rgba(255,255,255,.45)",fontSize:11,marginTop:10}}>501(c)(3) Nonprofit Organization</div></div><div className="hero-logo" style={{flexShrink:0,position:"relative",width:380,height:380,display:"flex",alignItems:"center",justifyContent:"center"}}><div className="hl-glow" style={{position:"absolute",inset:0,borderRadius:"50%",background:"radial-gradient(circle,rgba(255,0,36,.2) 0%,rgba(255,242,0,.1) 40%,transparent 70%)",filter:"blur(40px)"}}/><img src={LOGO} alt="Delmarva Blast" style={{position:"relative",width:320,height:320,objectFit:"contain",filter:"drop-shadow(0 8px 40px rgba(255,0,36,.25)) drop-shadow(0 4px 20px rgba(0,0,0,.4))"}}/></div></div></div></div>
<div className="c" style={{marginTop:-24,position:"relative",zIndex:2,marginBottom:56}}><div className="stg" style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",borderRadius:10,overflow:"hidden",boxShadow:"0 4px 20px rgba(0,0,0,.07)"}}>{[{n:"100+",l:"Athletes Supported"},{n:"16",l:"Sports Covered"},{n:"3",l:"States Served"}].map((s,i)=><div key={i} style={{textAlign:"center",padding:"26px 14px",background:"#fff",borderRight:i<2?"1px solid var(--bd)":"none"}}><div style={{fontSize:30,fontWeight:800,color:"var(--r)",fontFamily:hf,lineHeight:1}}>{s.n}</div><div style={{fontSize:10,color:"var(--td)",fontWeight:600,letterSpacing:1.5,textTransform:"uppercase",marginTop:6}}>{s.l}</div></div>)}</div></div>
<div className="c" style={{paddingBottom:64}}><div className="tag">Our Mission</div><div className="al"/><h2 className="hd" style={{fontSize:34,marginBottom:14,maxWidth:580}}>FINANCIAL CHALLENGES SHOULD NEVER KEEP A CHILD OFF THE FIELD.</h2><p style={{color:"var(--tm)",fontSize:15,lineHeight:1.8,maxWidth:620,marginBottom:32}}>Traditional scholarships help a few with large awards. We give smaller amounts to more families. Twenty kids on the field matters more than one at a showcase.</p><div className="g2" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>{[{t:"Access Over Exclusion",d:"Small awards that remove barriers for families who need it most."},{t:"Community-Powered",d:"Every scholarship funded by people who care."},{t:"All Sports, All Kids",d:"Soccer, baseball, basketball, football, lacrosse, field hockey, and more."},{t:"Transparent",d:"70-75% of funds go directly to program services."}].map((v,i)=><div key={i} className="card" style={{padding:22}}><h3 style={{fontSize:15,fontWeight:700,marginBottom:5,color:"var(--r)"}}>{v.t}</h3><p style={{fontSize:13,color:"var(--tm)",lineHeight:1.7,margin:0}}>{v.d}</p></div>)}</div><div style={{marginTop:48}}><div className="tag">Support an Athlete</div><div className="al"/><h2 className="hd" style={{fontSize:28,marginBottom:8,maxWidth:580}}>EVERY LEVEL OF GIVING MAKES A DIFFERENCE</h2><p style={{color:"var(--tm)",fontSize:14,lineHeight:1.7,maxWidth:580,marginBottom:20}}>Choose an amount that fits you. Every dollar goes toward helping a child play.</p><div className="dg" style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14,marginBottom:20}}>{[{a:"$25",l:"Hit the Field"},{a:"$50",l:"First Whistle"},{a:"$100",l:"Gear Them Up"},{a:"$175",l:"Join the Team"},{a:"$250",l:"All-Star Support"},{a:"$500+",l:"MVP Impact"}].map((d,i)=><div key={i} className="card cc" onClick={()=>go("donate")} style={{padding:20,textAlign:"center"}}><div style={{fontSize:28,fontWeight:800,color:"var(--r)",fontFamily:hf,marginBottom:3}}>{d.a}</div><div style={{fontSize:12,fontWeight:700}}>{d.l}</div></div>)}</div><div style={{textAlign:"center",marginTop:8}}><button onClick={()=>go("donate")} className="btn br" style={{padding:"12px 32px"}}>Support an Athlete</button></div></div></div>
